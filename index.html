<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Твой Канал — Архив</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap&quot; rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: white;
            line-height: 1.6;
        }

        .background {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, #0a0a0a, #111);
            z-index: -2;
        }

        .hero {
            height: 85vh;
            display: flex;
            align-items: flex-end;
            padding: 60px;
            position: relative;
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0'); /* ← Замени на свою ссылку */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(10,10,10,0.92), rgba(10,10,10,0.45));
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 720px;
        }

        .tag {
            color: #aaa;
            letter-spacing: 4px;
            font-size: 13px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(48px, 9vw, 110px);
            line-height: 0.95;
            font-weight: 800;
            margin-bottom: 24px;
        }

        .description {
            color: #ccc;
            font-size: 18px;
            max-width: 580px;
        }

        nav {
            position: sticky;
            top: 0;
            backdrop-filter: blur(16px);
            background: rgba(10,10,10,0.85);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            z-index: 100;
        }

        .nav-inner {
            display: flex;
            gap: 40px;
            padding: 20px 60px;
            flex-wrap: wrap;
        }

        .nav-inner a {
            color: #bbb;
            text-decoration: none;
            font-size: 15px;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav-inner a:hover {
            color: white;
        }

        .section {
            padding: 90px 60px;
        }

        .section-title {
            font-size: 14px;
            letter-spacing: 3px;
            color: #777;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 28px;
        }

        .video-card {
            background: #111;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.4s;
        }

        .video-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255,255,255,0.2);
        }

        .video-preview {
            aspect-ratio: 16/9;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .video-info {
            padding: 22px;
        }

        .video-info h3 {
            margin-bottom: 10px;
            font-size: 19px;
        }

        .video-info p {
            color: #999;
            font-size: 15px;
        }

        .player-section {
            padding: 90px 60px;
            background: #0a0a0a;
